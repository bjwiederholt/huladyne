  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 24px 20px 0;
    }

    .site-header img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      opacity: 0.8;
    }

    .site-header span {
      font-size: 0.85rem;
      font-weight: 600;
      color: #64748b;
      letter-spacing: 0.03em;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 48px 20px 40px;
      max-width: 600px;
      margin: 0 auto;
    }

    .hero h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .hero p {
      font-size: 0.95rem;
      color: #94a3b8;
      max-width: 420px;
      margin: 0 auto;
    }

    /* ── Game Cards ── */
    .games {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .game-card {
      display: block;
      background: #1e293b;
      border-radius: 12px;
      padding: 1.75rem;
      border-top: 4px solid #64748b;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.3s ease, transform 0.2s ease;
      position: relative;
    }

    .game-card:hover {
      transform: translateY(-2px);
    }

    .game-card--signal { border-top-color: #00d4ff; }
    .game-card--signal:hover { box-shadow: 0 8px 30px rgba(0, 212, 255, 0.15); }

    .game-card--fuse { border-top-color: #f59e0b; }
    .game-card--fuse:hover { box-shadow: 0 8px 30px rgba(245, 158, 11, 0.15); }

    .game-card__name {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }

    .game-card--signal .game-card__name { color: #00d4ff; }
    .game-card--fuse .game-card__name { color: #f59e0b; }

    .game-card__desc {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-bottom: 0.75rem;
    }

    .game-card__status {
      font-size: 0.8rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px 20px 40px;
    }

    footer a {
      color: #64748b;
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }

    footer a:hover {
      color: #94a3b8;
    }

    footer .made-by {
      font-size: 0.8rem;
      color: #475569;
      margin-top: 0.75rem;
    }

    /* ── Reduced Motion ── */
    @media (prefers-reduced-motion: reduce) {
      .game-card {
        transition: none;
      }
    }
  </style>

    <img src="/HD_robot.png" alt="" aria-hidden="true">

  </header>

  <section class="hero">
    <h1>The Game Lab</h1>
    <p>Daily puzzles from the lab. Pick one, solve it, tell your friends you're smarter than them.</p>
  </section>

  <section class="games">
    <a href="#" class="game-card game-card--signal">
      <div class="game-card__name">Signal</div>
      <p class="game-card__desc">Find the hidden words. Trace the signal.</p>
